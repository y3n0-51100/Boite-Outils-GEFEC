name: Construire EtiquettesEAN.exe

# Construit l'exécutable Windows autonome « Étiquettes EAN — Douchette virtuelle »
# avec PyInstaller, sur un runner Windows, puis committe EtiquettesEAN.exe à la
# racine du dépôt (pour qu'il soit téléchargeable depuis la Boîte à Outils).
#
# Déclenchement : manuel (Actions → Run workflow) ou à chaque modification du
# code source de l'outil.

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'tools/etiquettes-ean/**'
      - '.github/workflows/build-etiquettes-ean.yml'

permissions:
  contents: write

concurrency:
  group: build-etiquettes-ean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        working-directory: tools/etiquettes-ean
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Self-test de l'extraction
        working-directory: tools/etiquettes-ean
        run: python etiquette_ean.py --selftest

      - name: Construction de l'exécutable
        working-directory: tools/etiquettes-ean
        run: >
          python -m PyInstaller --noconfirm --onefile --windowed
          --name EtiquettesEAN
          --collect-all pyautogui
          --collect-all pypdf
          etiquette_ean.py

      - name: Copie de l'exécutable à la racine
        run: copy /Y tools\etiquettes-ean\dist\EtiquettesEAN.exe EtiquettesEAN.exe
        shell: cmd

      - name: Commit & push si l'exécutable a changé
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add EtiquettesEAN.exe
          if git diff --cached --quiet; then
            echo "Aucun changement — l'exécutable est déjà à jour."
          else
            git commit -m "Build automatique de EtiquettesEAN.exe"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Publication de l'artefact (téléchargement direct)
        uses: actions/upload-artifact@v4
        with:
          name: EtiquettesEAN
          path: tools/etiquettes-ean/dist/EtiquettesEAN.exe
