<script>
/* ── PDF.js ───────────────────────────────────────────────────────────────── */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── State ───────────────────────────────────────────────────────────────── */
const S = { mcFiles: [], rgFiles: [], results: null };

/* ═══════════════════════════ PDF CORE ═══════════════════════════════════════ */

async function extractPdfItems(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const out = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc   = await page.getTextContent();
    tc.items.forEach(it => {
      const s = (it.str || '').trim();
      if (s) out.push({ text: s, x: it.transform[4], y: it.transform[5], w: it.width || 0, page: p });
    });
  }
  return out;
}

function groupIntoRows(items, yTol = 3) {
  if (!items.length) return [];
  const sorted = [...items].sort((a, b) =>
    a.page !== b.page ? a.page - b.page : b.y - a.y
  );
  const rows = [];
  let cur = [sorted[0]], cy = sorted[0].y, cp = sorted[0].page;
  for (let i = 1; i < sorted.length; i++) {
    const it = sorted[i];
    if (it.page === cp && Math.abs(it.y - cy) <= yTol) {
      cur.push(it);
    } else {
      rows.push([...cur].sort((a, b) => a.x - b.x));
      cur = [it]; cy = it.y; cp = it.page;
    }
  }
  if (cur.length) rows.push([...cur].sort((a, b) => a.x - b.x));
  return rows;
}

/* ═══════════════════════ COLUMN MAPPING ════════════════════════════════════ */

function colXsFromRow(row, minGap = 8) {
  // Merge header items that belong to the same cell (end-to-start gap < minGap)
  if (!row.length) return [];
  const s = [...row].sort((a, b) => a.x - b.x);
  const xs = [s[0].x];
  let prevEnd = s[0].x + (s[0].w > 1 ? s[0].w : s[0].text.length * 5.5);
  for (let i = 1; i < s.length; i++) {
    const gap = s[i].x - prevEnd;
    if (gap >= minGap) xs.push(s[i].x);
    prevEnd = Math.max(prevEnd, s[i].x + (s[i].w > 1 ? s[i].w : s[i].text.length * 5.5));
  }
  return xs;
}

function buildRanges(xs) {
  return xs.map((x, i) => ({
    min: i === 0 ? -Infinity : (x + xs[i - 1]) / 2,
    max: i === xs.length - 1 ? Infinity : (x + xs[i + 1]) / 2
  }));
}

function assignCol(x, ranges) {
  if (!ranges) return 0;
  for (let i = 0; i < ranges.length; i++) {
    if (x >= ranges[i].min && x < ranges[i].max) return i;
  }
  return ranges.length - 1;
}

function mapToCells(row, ranges, n = 17) {
  const cells = new Array(n).fill('');
  if (!ranges) { row.forEach((it, i) => { if (i < n) cells[i] = it.text; }); return cells; }
  row.forEach(it => {
    const c = assignCol(it.x, ranges);
    if (c < n) cells[c] = cells[c] ? cells[c] + ' ' + it.text : it.text;
  });
  return cells;
}

/* ═════════════════════ PARSE MÉDIA CENTRALE ════════════════════════════════ */

async function parseMCFile(file) {
  const items = await extractPdfItems(file);
  const eans  = new Set();
  items.forEach(it => (it.text.match(/\b(\d{12,13})\b/g) || []).forEach(e => eans.add(e)));
  return eans;
}

/* ══════════════════════ PARSE REGROUPEMENT ═════════════════════════════════ */

async function parseRGFile(file) {
  const items = await extractPdfItems(file);
  const rows  = groupIntoRows(items);
  const meta  = { magasin: '', regroupement: '', date_solde: '', filename: file.name };
  const prods = [];
  let ranges  = null;
  let nDet    = 17;   // number of detected columns
  let inTable = false;

  for (const row of rows) {
    const rowTxt = row.map(r => r.text).join(' ');

    // meta (scan all rows)
    if (!meta.magasin) {
      const m = rowTxt.match(/Magasin\s*:\s*([^\|\n]+?)(?:\s{2,}|Regroupement\s*:|$)/i);
      if (m) meta.magasin = m[1].trim();
    }
    if (!meta.regroupement) {
      const m = rowTxt.match(/Regroupement\s*:\s*([^\|\n]+?)(?:\s{2,}|Date\s+solde\s*:|$)/i);
      if (m) meta.regroupement = m[1].trim();
    }
    if (!meta.date_solde) {
      const m = rowTxt.match(/Date\s+solde\s*:\s*(\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4})/i);
      if (m) meta.date_solde = m[1].trim();
    }

    // header row — recalibrate on each page
    if (/\bCode\s*produit\b/i.test(rowTxt)) {
      inTable = true;
      const xs = colXsFromRow(row);
      nDet    = Math.max(xs.length, 17);
      ranges  = buildRanges(xs);
      continue;
    }
    if (!inTable) continue;

    // secteur
    if (/^\s*secteur\s*:/i.test(rowTxt)) {
      prods.push({ type: 'secteur', label: rowTxt.trim() }); continue;
    }

    // product
    const codeItem = row.find(r => /^\d{12,13}$/.test(r.text));
    if (!codeItem) continue;

    const cells = mapToCells(row, ranges, Math.max(nDet, 17));
    if (!/^\d{12,13}$/.test(cells[0])) cells[0] = codeItem.text;

    // dispo: absolute indices → relative last-3 → positional fallback
    let [dh, de, dt] = [cells[14], cells[15], cells[16]];

    if (!dh && !de && !dt && nDet < 17) {
      dt = cells[nDet - 1]; de = cells[nDet - 2]; dh = cells[nDet - 3];
    }
    if (!dh && !de && !dt) {
      const cands = row
        .filter(r => /^\d{1,4}$/.test(r.text) && r.x !== codeItem.x)
        .sort((a, b) => b.x - a.x);
      if (cands[0]) dt = cands[0].text;
      if (cands[1]) de = cands[1].text;
      if (cands[2]) dh = cands[2].text;
    }

    prods.push({
      type: 'product', code: cells[0],
      libelle: cells[1], famille: cells[2], marque: cells[3],
      pve: cells[5], solde: cells[10],
      dispo_h: dh || '', dispo_ex: de || '', dispo_ttl: dt || ''
    });
  }
  return { products: cleanSecteurs(prods), meta };
}

/* ══════════════════════════ FILTER ═════════════════════════════════════════ */

function cleanSecteurs(arr) {
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    if (arr[i].type !== 'secteur') { out.push(arr[i]); continue; }
    let has = false;
    for (let j = i + 1; j < arr.length; j++) {
      if (arr[j].type === 'product') { has = true; break; }
      if (arr[j].type === 'secteur') break;
    }
    if (has) out.push(arr[i]);
  }
  return out;
}

function isZero(v) { return !v || ['0','','-'].includes((v||'').trim()); }

function filterProducts(prods, eans, assigned, currentLabel) {
  const kept = [], mc = [], stock = [], dup = [];
  for (const p of prods) {
    if (p.type === 'secteur') { kept.push(p); continue; }
    if (eans.has(p.code))                                              { mc.push(p);    continue; }
    if (isZero(p.dispo_h) && isZero(p.dispo_ex) && isZero(p.dispo_ttl)) { stock.push(p); continue; }
    // arbitrage inter/intra-regroupement : 1er fichier qui contient l'EAN = prioritaire
    if (assigned && assigned.has(p.code)) {
      dup.push({ ...p, keptIn: assigned.get(p.code) });
      continue;
    }
    if (assigned) assigned.set(p.code, currentLabel);
    kept.push(p);
  }
  return { kept: cleanSecteurs(kept), removedMC: mc, removedStock: stock, removedDup: dup };
}

/* ══════════════════════════ LOG ════════════════════════════════════════════ */

const clog = document.getElementById('clog');
let logFirst = true;
function log(msg, cls = '') {
  if (logFirst) { clog.innerHTML = ''; logFirst = false; }
  const d = document.createElement('div');
  d.className = 'c-line ' + cls;
  const ts = new Date().toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  d.innerHTML = '<span class="ts"></span><span class="msg"></span>';
  d.querySelector('.ts').textContent  = ts;
  d.querySelector('.msg').textContent = msg;
  clog.appendChild(d);
  clog.scrollTop = clog.scrollHeight;
}

/* ════════════════════════ FILE ZONES ═══════════════════════════════════════ */

function renderFileList(listId, arr, onRemove) {
  const el = document.getElementById(listId);
  el.innerHTML = '';
  arr.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'file-entry';
    const nameEl = document.createElement('span'); nameEl.className = 'file-entry-name'; nameEl.title = f.name; nameEl.textContent = f.name;
    const rmBtn  = document.createElement('button'); rmBtn.className = 'file-entry-rm'; rmBtn.textContent = '✕';
    rmBtn.addEventListener('click', () => onRemove(i));
    row.innerHTML = '<span class="file-entry-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>';
    row.appendChild(nameEl);
    row.appendChild(rmBtn);
    el.appendChild(row);
  });
}

function updateUI() {
  renderFileList('mc-list', S.mcFiles, i => { S.mcFiles.splice(i,1); updateUI(); });
  renderFileList('rg-list', S.rgFiles, i => { S.rgFiles.splice(i,1); updateUI(); });
  const ok = S.mcFiles.length > 0 && S.rgFiles.length > 0;
  document.getElementById('btn-analyze').disabled = !ok;
  document.getElementById('s1').className = 'step-n ' + (S.mcFiles.length ? 'done' : 'active');
  document.getElementById('s2').className = 'step-n ' + (S.rgFiles.length ? 'done' : S.mcFiles.length ? 'active' : '');
}

// Ajoute des fichiers à la liste ; si zip=true, déballe les .zip et y prend les PDF.
async function addFiles(files, arr, zip) {
  for (const f of files) {
    const name = (f.name || '').toLowerCase();
    if (zip && name.endsWith('.zip')) {
      try {
        const z = await JSZip.loadAsync(await f.arrayBuffer());
        const entries = Object.keys(z.files).filter(n => !z.files[n].dir && n.toLowerCase().endsWith('.pdf'));
        if (!entries.length) { log('ZIP « ' + f.name +' » : aucun PDF à l\'intérieur', 'err'); continue; }
        let added = 0;
        for (const n of entries) {
          const base = n.split('/').pop();
          if (arr.find(x => x.name === base)) continue;
          const blob = await z.files[n].async('blob');
          arr.push(new File([blob], base, { type: 'application/pdf' }));
          added++;
        }
        log(added + ' PDF extrait(s) du ZIP « ' + f.name + ' »', 'ok');
      } catch (err) { log('ZIP « ' + f.name + ' » illisible : ' + err.message, 'err'); }
    } else if (name.endsWith('.pdf')) {
      if (!arr.find(x => x.name === f.name)) arr.push(f);
    }
  }
  updateUI();
}

function setupZone(zoneId, addId, inputId, arr, zip) {
  const zone  = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  document.getElementById(addId).addEventListener('click', () => input.click());
  input.addEventListener('change', async e => {
    await addFiles([...e.target.files], arr, zip);
    input.value = '';
  });
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('dragover');
    await addFiles([...e.dataTransfer.files], arr, zip);
  });
}
setupZone('mc-zone','mc-add','mc-input', S.mcFiles, true);
setupZone('rg-zone','rg-add','rg-input', S.rgFiles, true);

/* ═══════════════════════ ANALYSIS ══════════════════════════════════════════ */

document.getElementById('btn-analyze').addEventListener('click', runAnalysis);

async function runAnalysis() {
  document.getElementById('btn-analyze').disabled = true;
  document.getElementById('btn-print').disabled   = true;
  document.getElementById('empty-state').style.display  = 'none';
  document.getElementById('results-wrap').style.display = 'none';
  document.getElementById('err-banner').className       = 'error-banner';
  document.getElementById('prog-wrap').style.display    = 'flex';
  document.getElementById('cbar').className = 'console-bar busy';

  const fill  = document.getElementById('prog-fill');
  const pct   = document.getElementById('prog-pct');
  const total = S.mcFiles.length + S.rgFiles.length;
  let step = 0;

  fill.style.width = '2%';
  fill.className = 'prog-fill';
  pct.textContent = '0%';

  function setP(n) {
    const p = total > 0 ? Math.round((n / total) * 100) : 100;
    fill.style.width = p + '%';
    pct.textContent  = p + '%';
  }

  try {
    log('Lecture des fichiers Média Centrale…');
    const mcEans = new Set();
    for (const f of S.mcFiles) {
      log('  ' + f.name.slice(0, 52));
      const eans = await parseMCFile(f);
      eans.forEach(e => mcEans.add(e));
      setP(++step);
    }
    log(mcEans.size + ' référence(s) Média Centrale chargées', 'ok');

    const allResults = [];
    const assigned = new Map();   // EAN → regroupement où le produit est déjà conservé (1er gagne)
    // Tri déterministe par nom : l'arbitrage des doublons ne dépend PAS de l'ordre d'ajout.
    // Mêmes fichiers en entrée ⇒ toujours le même résultat, quel que soit l'utilisateur.
    const rgSorted = [...S.rgFiles].sort((a, b) => a.name.localeCompare(b.name, 'fr', { numeric: true, sensitivity: 'base' }));
    for (const f of rgSorted) {
      log('Analyse : ' + f.name.slice(0, 48) + '…');
      const { products, meta }          = await parseRGFile(f);
      const label = meta.regroupement || shortName(f.name);
      const { kept, removedMC, removedStock, removedDup } = filterProducts(products, mcEans, assigned, label);
      const totP  = products.filter(p => p.type === 'product').length;
      const keptP = kept.filter(p => p.type === 'product').length;
      allResults.push({
        filename: f.name, meta, kept,
        removed_mc: removedMC, removed_stock: removedStock, removed_dup: removedDup,
        stats: { total: totP, kept: keptP, removed_mc: removedMC.length, removed_stock: removedStock.length, removed_dup: removedDup.length }
      });
      log('  → ' + keptP + ' à imprimer · retirés : ' + removedMC.length + ' Média Centrale, ' + removedStock.length + ' sans stock, ' + removedDup.length + ' doublon regroupement', 'ok');
      setP(++step);
    }

    S.results = allResults;
    renderResults(allResults);
    document.getElementById('cbar').className = 'console-bar ok';
    document.getElementById('btn-analyze').disabled = false;
    document.getElementById('btn-print').disabled   = false;
    document.getElementById('prog-wrap').style.display = 'none';
    document.getElementById('res-status').textContent  = 'terminé';

  } catch (err) {
    document.getElementById('cbar').className = 'console-bar';
    document.getElementById('prog-wrap').style.display = 'none';
    document.getElementById('btn-analyze').disabled = false;
    document.getElementById('empty-state').style.display = 'flex';
    showError('Erreur : ' + err.message);
    log('Échec : ' + err.message, 'err');
    console.error(err);
  }
}

function showError(msg) {
  const b = document.getElementById('err-banner');
  b.textContent = msg; b.className = 'error-banner show';
}

/* ══════════════════════ RENDER RESULTS ═════════════════════════════════════ */

function renderResults(results) {
  let tK=0,tM=0,tS=0,tT=0,tD=0;
  results.forEach(r => { tK+=r.stats.kept; tM+=r.stats.removed_mc; tS+=r.stats.removed_stock; tD+=(r.stats.removed_dup||0); tT+=r.stats.total; });
  document.getElementById('stats-row').innerHTML =
    '<div class="stat"><div class="stat-lbl">Produits lus</div><div class="stat-val">'+tT+'</div><div class="stat-hint">total des listings importés</div></div>' +
    '<div class="stat g"><div class="stat-lbl">À imprimer</div><div class="stat-val">'+tK+'</div><div class="stat-hint">étiquettes à créer en magasin</div></div>' +
    '<div class="stat r"><div class="stat-lbl">Déjà en Média Centrale</div><div class="stat-val">'+tM+'</div><div class="stat-hint">gérés par la centrale, à ne pas refaire</div></div>' +
    '<div class="stat o"><div class="stat-lbl">Sans stock</div><div class="stat-val">'+tS+'</div><div class="stat-hint">dispo 0/0/0, rien à solder</div></div>' +
    '<div class="stat r"><div class="stat-lbl">Doublon regroupement</div><div class="stat-val">'+tD+'</div><div class="stat-hint">déjà gardé dans un autre regroupement</div></div>';

  const tabs = document.getElementById('file-tabs');
  tabs.innerHTML = '';
  results.forEach((r, i) => {
    const btn = document.createElement('button');
    btn.className = 'file-tab' + (i===0?' active':'');
    btn.textContent = shortName(r.filename);
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.res-panel').forEach((p,j) => { p.style.display = j===i?'flex':'none'; });
    });
    tabs.appendChild(btn);
  });

  const panels = document.getElementById('res-panels');
  panels.innerHTML = '';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'res-panel';
    div.style.cssText = 'display:'+(i===0?'flex':'none')+';flex-direction:column;flex:1';
    div.innerHTML = buildResultPanel(r);
    panels.appendChild(div);
    div.querySelectorAll('.rm-toggle').forEach(t => {
      t.addEventListener('click', () => { t.classList.toggle('open'); t.nextElementSibling.classList.toggle('open'); });
    });
  });

  document.getElementById('main-sub').textContent = results.length+' regroupement(s) traité(s) · '+tK+' étiquette(s) à imprimer';
  document.getElementById('results-wrap').style.display = 'flex';
}

function shortName(fn) {
  return fn.replace(/REGROUPEMENT\s+SOLDE\s+/i,'').replace(/\s+BUT\s+.+/i,'').replace(/\.pdf$/i,'').trim()||fn;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildResultPanel(r) {
  let rows='';
  r.kept.forEach(item => {
    if (item.type==='secteur') {
      rows += '<tr class="sect-row"><td colspan="6">▸ '+esc(item.label.replace(/^secteur\s*:\s*/i,'').toUpperCase())+'</td></tr>';
    } else {
      rows += '<tr><td class="code-cell">'+esc(item.code)+'</td><td>'+esc(item.libelle)+'</td>' +
              '<td style="color:var(--text-soft)">'+esc(item.famille)+'</td>' +
              '<td style="color:var(--text-soft)">'+esc(item.marque)+'</td>' +
              '<td class="price-cell">'+esc(item.pve)+'</td>' +
              '<td class="price-cell"><span style="color:var(--accent)">'+(esc(item.solde)||'—')+'</span></td></tr>';
    }
  });

  const mkMini = (items, cols) =>
    items.map(p=>'<tr>'+cols.map(c=>'<td>'+esc(p[c]||'')+'</td>').join('')+'</tr>').join('');

  const rmMC = r.removed_mc.length ? (
    '<div class="rm-section">' +
    '<button class="rm-toggle mc">' +
    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
    'Retirés — déjà dans Média Centrale' +
    '<span class="rm-count">'+r.removed_mc.length+'</span>' +
    '<svg class="arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</button>' +
    '<div class="rm-body"><table class="rm-mini-table"><thead><tr><th>Code</th><th>Libéllé</th><th>Famille</th></tr></thead>' +
    '<tbody>'+mkMini(r.removed_mc,['code','libelle','famille'])+'</tbody></table></div></div>'
  ) : '';

  const rmSt = r.removed_stock.length ? (
    '<div class="rm-section">' +
    '<button class="rm-toggle stock">' +
    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 0 1-2-2V7m4-2h14a2 2 0 0 1 2 2v9"/></svg>' +
    'Retirés — stock nul (Dispo 0/0/0)' +
    '<span class="rm-count">'+r.removed_stock.length+'</span>' +
    '<svg class="arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</button>' +
    '<div class="rm-body"><table class="rm-mini-table"><thead><tr><th>Code</th><th>Libéllé</th><th>Famille</th><th>Dispo H/Ex/Ttl</th></tr></thead><tbody>' +
    r.removed_stock.map(p=>'<tr><td>'+esc(p.code)+'</td><td>'+esc(p.libelle)+'</td><td>'+esc(p.famille)+'</td><td>'+(p.dispo_h||'0')+'/'+(p.dispo_ex||'0')+'/'+(p.dispo_ttl||'0')+'</td></tr>').join('') +
    '</tbody></table></div></div>'
  ) : '';

  const rmDup = (r.removed_dup && r.removed_dup.length) ? (
    '<div class="rm-section">' +
    '<button class="rm-toggle mc">' +
    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
    'Retirés — doublon inter-regroupement' +
    '<span class="rm-count">'+r.removed_dup.length+'</span>' +
    '<svg class="arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</button>' +
    '<div class="rm-body"><table class="rm-mini-table"><thead><tr><th>Code</th><th>Libéllé</th><th>Famille</th><th>Conservé dans</th></tr></thead><tbody>' +
    r.removed_dup.map(p=>'<tr><td>'+esc(p.code)+'</td><td>'+esc(p.libelle)+'</td><td>'+esc(p.famille)+'</td><td>'+esc(p.keptIn)+'</td></tr>').join('') +
    '</tbody></table></div></div>'
  ) : '';

  const s = r.stats;
  const recap =
    '<div class="panel-recap">' +
      '<span class="pr-name">'+esc(r.meta.regroupement || shortName(r.filename))+'</span>' +
      '<span class="chip"><b>'+s.total+'</b> lus</span>' +
      '<span class="arrow-sep">→</span>' +
      '<span class="chip g"><b>'+s.kept+'</b> à imprimer</span>' +
    '</div>';

  return '<div style="overflow-y:auto;flex:1">' + recap +
    '<table class="res-table"><thead><tr>' +
    '<th>Code produit</th><th>Libéllé</th><th>Famille</th><th>Marque</th>' +
    '<th style="text-align:right">PVE TTC</th><th style="text-align:right">PV Solde</th>' +
    '</tr></thead><tbody>'+(rows||'<tr><td colspan="6" style="text-align:center;color:var(--text-mute);padding:20px">Aucun produit conservé</td></tr>')+'</tbody></table>' +
    rmMC + rmSt + rmDup + '</div>';
}

/* ═══════════════════════════ PRINT ═════════════════════════════════════════ */

document.getElementById('btn-print').addEventListener('click', () => {
  if (!S.results) return;
  buildPrintArea(S.results);
  window.print();
});

function buildPrintArea(results) {
  const today = new Date().toLocaleDateString('fr-FR');
  const area  = document.getElementById('printArea');
  area.innerHTML = '';
  results.forEach(r => {
    const doc = document.createElement('div');
    doc.className = 'pr-doc';
    let rows = '';
    r.kept.forEach(item => {
      if (item.type==='secteur') {
        rows += '<tr class="pr-sect"><td colspan="6">'+esc(item.label.replace(/^secteur\s*:\s*/i,'').toUpperCase())+'</td></tr>';
      } else {
        rows += '<tr><td style="font-family:monospace">'+esc(item.code)+'</td><td>'+esc(item.libelle)+'</td><td>'+esc(item.famille)+'</td><td>'+esc(item.marque)+'</td><td style="text-align:right">'+esc(item.pve)+'</td><td style="text-align:right;font-weight:600">'+(esc(item.solde)||'—')+'</td></tr>';
      }
    });
    const m = r.meta;
    doc.innerHTML =
      '<div class="pr-title">LISTE SOLDES — '+esc(r.filename.replace(/\.pdf$/i,'').toUpperCase())+'</div>' +
      '<div class="pr-meta">Magasin : '+esc(m.magasin)+' &nbsp;|  Regroupement : '+esc(m.regroupement)+' &nbsp;|  Date solde : '+esc(m.date_solde)+' &nbsp;|  Généré le '+today+' &nbsp;|  <strong>'+r.stats.removed_mc+' doublon(s) MC retirés</strong> &nbsp;|  <strong>'+r.stats.removed_stock+' sans stock retirés</strong> &nbsp;|  <strong>'+(r.stats.removed_dup||0)+' doublon(s) regroupement retirés</strong> &nbsp;|  <strong>'+r.stats.kept+' conservés</strong></div>' +
      '<table class="pr-table"><thead><tr><th>Code produit</th><th>Libéllé produit</th><th>Famille</th><th>Marque</th><th>PVE TTC</th><th>PV Solde TTC</th></tr></thead><tbody>'+rows+'</tbody></table>';
    area.appendChild(doc);
  });
}
<\/script>
</body>

</script>

<script>
/* ════════════════════════════════════════════════════════════════
   MOTEUR DE LA SUITE — chargement des outils, valorisation partagée,
   navigation, harmonisation visuelle (charte claire) des outils hérités.
   ════════════════════════════════════════════════════════════════ */
const state = { valoFile:null, valoEanCount:null, injected:new Set(), iframeReady:new Set() };

/* CSS injecté dans les iframes hérités (CETELEM, Soldes) pour les basculer
   en charte claire : ces outils sont pilotés par des variables CSS, on les
   redéfinit simplement vers la palette claire commune. */
const LIGHT_THEME = `
:root{
  --bg-0:#eef1f6!important;--bg-1:#ffffff!important;--bg-2:#f5f7fb!important;--bg-3:#eceff5!important;
  --line:#dde3ec!important;--line-soft:#e9edf3!important;
  --text:#172033!important;--text-soft:#5a6678!important;--text-mute:#97a1b2!important;
}
html,body{background:#eef1f6!important;color:#172033!important;}
/* bandeaux d'en-tête des outils hérités : codés en dur -> surface claire */
.topbar{background:rgba(255,255,255,.85)!important;border-bottom:1px solid #dde3ec!important;}
.brand-title,.brand-text,.topbar h1,.topbar .title{color:#172033!important;}
.brand-sub{color:#97a1b2!important;}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd6e6;border-radius:6px}
`;

function injectTheme(doc){
  try{
    if(!doc || doc.getElementById('__suite_light')) return;
    const st=doc.createElement('style'); st.id='__suite_light'; st.textContent=LIGHT_THEME;
    (doc.head||doc.documentElement).appendChild(st);
  }catch(e){}
}

/* ── Statut de la base article → chip dans le ruban ─────────── */
function updateBaseStatus(){
  const slot=document.getElementById('srBase');
  const ribbon=document.getElementById('statusRibbon');
  if(!slot) return;
  try{
    const b=window.BASE_ECO;
    const n=b&&b.data?(b.count||Object.keys(b.data).length):0;
    if(!n) throw new Error('vide');
    const fmt=v=>{const d=v?new Date(v):null;return d&&!isNaN(d.getTime())?d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}):null;};
    const ds=fmt(b.updated)||'date inconnue';
    const cs=fmt(window.BASE_CHECKED);
    const check=cs&&cs!==ds?`<span class="sr-sep">·</span><span title="Contrôle automatique quotidien de la source">vérifiée le ${cs}</span>`:'';
    slot.innerHTML=`<div class="sr-chip"><span class="sr-dot ok"></span><span class="sr-name">Base NOSICA</span><span class="sr-sep">·</span><span>${n.toLocaleString('fr-FR')} réf.</span><span class="sr-sep">·</span><span>données du ${ds}</span>${check}</div>`;
  }catch(e){
    slot.innerHTML=`<div class="sr-chip"><span class="sr-dot never"></span><span class="sr-name">Base NOSICA</span><span class="sr-sep">·</span><span>non chargée — contacter Rémi SCHAFFHAUSER</span></div>`;
  }
  if(ribbon) ribbon.hidden=false;
}
document.addEventListener('DOMContentLoaded', updateBaseStatus);

/* ── Chargement des outils ──────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tool-frame').forEach(frame => {
    const view = frame.closest('.view-tool').dataset.view;
    frame.addEventListener('load', () => {
      state.iframeReady.add(view);
      const loader = frame.closest('.view-tool').querySelector('.pane-loader');
      if (loader) loader.classList.add('hide');
      if (frame.dataset.tpl) injectTheme(frame.contentDocument); // outils hérités -> charte claire
      maybeInject(frame);
    }, { once:true });

    if (frame.dataset.tpl) {
      const tpl = document.getElementById(frame.dataset.tpl);
      if (tpl) frame.srcdoc = tpl.textContent.replace(/<\\\/script/g, '</script');
    } else if (frame.dataset.src) {
      frame.src = frame.dataset.src; // Étiquettes 2.0 = fichier autonome (etiquette.html)
    }
  });
});

/* ── Injection de la valorisation partagée dans un outil ────── */
function maybeInject(frame) {
  const view = frame.closest('.view-tool').dataset.view;
  if (!state.valoFile || state.injected.has(view) || !state.iframeReady.has(view)) return;
  const inputId = frame.dataset.input;
  if (!inputId) return;
  let doc; try { doc = frame.contentDocument; } catch(e){ return; }
  if (!doc) return;
  const input = doc.getElementById(inputId);
  if (!input) return;
  try {
    const dt = new DataTransfer(); dt.items.add(state.valoFile);
    input.files = dt.files;
    input.dispatchEvent(new Event('change', { bubbles:true }));
    state.injected.add(view);
  } catch(e){ showToast("Déposez la valorisation directement dans l'outil.", true); }
}
function clearInjections(){
  state.injected.clear();
  document.querySelectorAll('.tool-frame').forEach(frame => {
    const view = frame.closest('.view-tool').dataset.view;
    if (!state.iframeReady.has(view) || !frame.dataset.input) return;
    let doc; try { doc = frame.contentDocument; } catch(e){ return; }
    const input = doc && doc.getElementById(frame.dataset.input);
    if (input) try { input.value=''; } catch(_){}
  });
}

/* ── Valorisation (dropzone accueil) ────────────────────────── */
const homeDrop=document.getElementById('homeDrop'), homeFile=document.getElementById('homeFile'),
      dropTitle=document.getElementById('dropTitle'), dropHint=document.getElementById('dropHint'),
      valoPill=document.getElementById('valoPill'), valoName=document.getElementById('valoName'),
      valoMeta=document.getElementById('valoMeta');

async function setValoFile(file, opts={}){
  if (!file) return;
  if (file.type && file.type!=='application/pdf' && !file.name.toLowerCase().endsWith('.pdf')){
    showToast('Format invalide — un PDF est attendu', true); return;
  }
  state.valoFile=file; state.injected.clear(); state.valoEanCount=null;
  homeDrop.classList.remove('loaded'); homeDrop.classList.add('parsing');
  dropTitle.textContent=file.name; dropHint.textContent='analyse en cours…';
  valoPill.hidden=false; valoName.textContent=file.name; valoMeta.textContent='… EAN';
  document.querySelectorAll('.tool-card').forEach(c=>c.classList.add('ready'));
  // ré-injecter dans les outils déjà chargés
  document.querySelectorAll('.tool-frame').forEach(maybeInject);
  countEans(file).then(n=>{
    state.valoEanCount=n; homeDrop.classList.remove('parsing'); homeDrop.classList.add('loaded');
    dropHint.textContent=`${n} EAN uniques détectés · prêt`; valoMeta.textContent=`${n} EAN`;
    // sauvegarde cloud (uniquement si déposée par l'utilisateur, pas si chargée depuis le cloud)
    if (!opts.fromCloud && window.onValoLocallySet) window.onValoLocallySet(file, n);
  }).catch(()=>{ homeDrop.classList.remove('parsing'); homeDrop.classList.add('loaded');
    dropHint.textContent='fichier prêt'; valoMeta.textContent='OK';
    if (!opts.fromCloud && window.onValoLocallySet) window.onValoLocallySet(file, null); });
}
function clearValoFile(){
  state.valoFile=null; state.valoEanCount=null; clearInjections();
  homeDrop.classList.remove('loaded','parsing');
  dropTitle.textContent='Glissez le PDF de valorisation'; dropHint.textContent='ou cliquez pour parcourir · .pdf';
  homeFile.value=''; valoPill.hidden=true;
  document.querySelectorAll('.tool-card:not([data-tool="solde"])').forEach(c=>c.classList.remove('ready'));
  switchView('home');
}
async function countEans(file){
  let lib = window.pdfjsLib;
  const f = document.querySelector('.view-tool[data-view="match"] .tool-frame');
  for (let i=0;i<40 && !lib;i++){ await new Promise(r=>setTimeout(r,100)); lib = window.pdfjsLib || (f&&f.contentWindow&&f.contentWindow.pdfjsLib); }
  if (!lib) throw new Error('pdfjsLib indisponible');
  const buf=await file.arrayBuffer();
  const pdf=await lib.getDocument({data:buf}).promise;
  const set=new Set();
  for (let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const text=(await page.getTextContent()).items.map(t=>t.str).join(' ');
    (text.match(/\b\d{13}\b/g)||[]).forEach(e=>set.add(e));
  }
  return set.size;
}
homeDrop.addEventListener('dragover',e=>{e.preventDefault();homeDrop.classList.add('dragover')});
homeDrop.addEventListener('dragleave',()=>homeDrop.classList.remove('dragover'));
homeDrop.addEventListener('drop',e=>{e.preventDefault();homeDrop.classList.remove('dragover');if(e.dataTransfer.files.length)setValoFile(e.dataTransfer.files[0])});
homeFile.addEventListener('change',e=>{if(e.target.files.length)setValoFile(e.target.files[0])});

/* ── Cartes outils ──────────────────────────────────────────── */
document.querySelectorAll('.tool-card').forEach(card=>{
  card.addEventListener('click',()=>{
    if (card.dataset.tool==='solde'){ switchView('solde'); return; }
    if (!card.classList.contains('ready')){ homeFile.click(); showToast("Importez d'abord la valorisation"); return; }
    switchView(card.dataset.tool);
  });
  card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();
    card.style.setProperty('--mx',(e.clientX-r.left)+'px');card.style.setProperty('--my',(e.clientY-r.top)+'px')});
});

/* ── Navigation ─────────────────────────────────────────────── */
const shell=document.querySelector('.shell'), tabNav=document.getElementById('tabNav'),
      tabs=tabNav.querySelectorAll('.tab'), tabIndicator=tabNav.querySelector('.tab-indicator');
function switchView(name){
  // pop-up "document partagé" avant d'ouvrir un outil (géré par app-auth.js)
  if (typeof window.moduleGate==='function' && !window.moduleGate(name)) return;
  shell.dataset.view=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.dataset.view===name));
  if (name==='home'){ tabNav.hidden=true; }
  else {
    tabNav.hidden=false;
    tabs.forEach(t=>{const on=t.dataset.tab===name;t.classList.toggle('active',on);t.setAttribute('aria-selected',on)});
    requestAnimationFrame(positionIndicator); setTimeout(positionIndicator,120);
    const frame=document.querySelector(`.view-tool[data-view="${name}"] .tool-frame`);
    if (frame) maybeInject(frame);
  }
}
function positionIndicator(){
  const active=tabNav.querySelector('.tab.active'); if(!active||tabNav.hidden)return;
  const nav=tabNav.getBoundingClientRect(), r=active.getBoundingClientRect();
  tabIndicator.style.left=(r.left-nav.left)+'px'; tabIndicator.style.width=r.width+'px';
  tabIndicator.classList.add('ready');
}
tabs.forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.tab)));
window.addEventListener('resize',positionIndicator);
document.getElementById('brand').addEventListener('click',()=>switchView('home'));
document.getElementById('valoChange').addEventListener('click',e=>{e.stopPropagation();clearValoFile()});
window.addEventListener('keydown',e=>{
  if (e.key==='Escape' && shell.dataset.view!=='home') switchView('home');
});

/* ── Toast ──────────────────────────────────────────────────── */
const toast=document.getElementById('toast'), toastText=document.getElementById('toastText');
let toastTimer=null;
function showToast(msg,isErr=false){
  toastText.textContent=msg; toast.classList.toggle('error',!!isErr); toast.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),2600);
}
</script>
<script src="app-auth.js"></script>
</body>
